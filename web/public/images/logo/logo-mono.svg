<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Mono glow filter -->
    <filter id="monoGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft center glow -->
    <filter id="monoSoftGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Node glow -->
    <filter id="monoNodeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Center radial glow (white) -->
    <radialGradient id="monoCenterGlow" cx="50%" cy="68%" r="25%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- === OUTER PETALS === -->
  <!-- Far-left petal -->
  <g filter="url(#monoGlow)">
    <path d="M256,340 Q200,330 130,310 Q80,295 60,290 Q90,260 140,240 Q185,225 220,230 Q240,280 256,340Z"
      fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.6" stroke-linejoin="round"/>
    <path d="M256,340 Q200,330 130,310 Q80,295 60,290"
      fill="none" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.4"/>
  </g>

  <!-- Far-right petal -->
  <g filter="url(#monoGlow)">
    <path d="M256,340 Q312,330 382,310 Q432,295 452,290 Q422,260 372,240 Q327,225 292,230 Q272,280 256,340Z"
      fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.6" stroke-linejoin="round"/>
    <path d="M256,340 Q312,330 382,310 Q432,295 452,290"
      fill="none" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.4"/>
  </g>

  <!-- === MIDDLE PETALS === -->
  <!-- Middle-left petal -->
  <g filter="url(#monoGlow)">
    <path d="M256,340 Q220,300 175,240 Q150,205 140,180 Q165,175 195,185 Q225,200 245,230 Q252,280 256,340Z"
      fill="#ffffff" fill-opacity="0.2" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.6" stroke-linejoin="round"/>
    <path d="M256,340 Q220,300 175,240 Q150,205 140,180"
      fill="none" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.35"/>
    <path d="M256,340 Q225,290 185,225"
      fill="none" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.35"/>
  </g>

  <!-- Middle-right petal -->
  <g filter="url(#monoGlow)">
    <path d="M256,340 Q292,300 337,240 Q362,205 372,180 Q347,175 317,185 Q287,200 267,230 Q260,280 256,340Z"
      fill="#ffffff" fill-opacity="0.2" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.6" stroke-linejoin="round"/>
    <path d="M256,340 Q292,300 337,240 Q362,205 372,180"
      fill="none" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.35"/>
    <path d="M256,340 Q287,290 327,225"
      fill="none" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.35"/>
  </g>

  <!-- === CENTER PETAL === -->
  <g filter="url(#monoGlow)">
    <path d="M256,340 Q240,280 235,220 Q232,180 236,150 Q240,125 256,110 Q272,125 276,150 Q280,180 277,220 Q272,280 256,340Z"
      fill="#ffffff" fill-opacity="0.25" stroke="#ffffff" stroke-width="1.8" stroke-opacity="0.6" stroke-linejoin="round"/>
    <path d="M256,340 Q240,280 235,220 Q232,180 236,150 Q240,125 256,110"
      fill="none" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.4"/>
    <path d="M256,340 Q272,280 277,220 Q280,180 276,150 Q272,125 256,110"
      fill="none" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.4"/>
    <path d="M256,330 L256,130"
      fill="none" stroke="#ffffff" stroke-width="0.7" stroke-opacity="0.4"/>
  </g>

  <!-- === CIRCUIT TRACES === -->
  <g fill="none" stroke="#ffffff" stroke-width="0.7" stroke-opacity="0.35">
    <path d="M256,310 L248,250 L240,200"/>
    <path d="M256,310 L264,250 L272,200"/>
    <path d="M248,250 L238,245"/>
    <path d="M264,250 L274,245"/>
    <path d="M248,320 L215,270 L185,230"/>
    <path d="M240,310 L210,265 L195,245"/>
    <path d="M215,270 L205,260"/>
    <path d="M264,320 L297,270 L327,230"/>
    <path d="M272,310 L302,265 L317,245"/>
    <path d="M297,270 L307,260"/>
    <path d="M235,330 L180,310 L120,298"/>
    <path d="M230,325 L175,305 Q150,295 135,290"/>
    <path d="M277,330 L332,310 L392,298"/>
    <path d="M282,325 L337,305 Q362,295 377,290"/>
  </g>

  <!-- === NEURAL NODES === -->
  <g filter="url(#monoNodeGlow)">
    <circle cx="240" cy="200" r="3.5" fill="#ffffff" fill-opacity="0.8"/>
    <circle cx="272" cy="200" r="3.5" fill="#ffffff" fill-opacity="0.8"/>
    <circle cx="256" cy="155" r="3" fill="#ffffff" fill-opacity="0.8"/>
    <circle cx="185" cy="230" r="3.5" fill="#ffffff" fill-opacity="0.75"/>
    <circle cx="205" cy="260" r="3" fill="#ffffff" fill-opacity="0.7"/>
    <circle cx="327" cy="230" r="3.5" fill="#ffffff" fill-opacity="0.75"/>
    <circle cx="307" cy="260" r="3" fill="#ffffff" fill-opacity="0.7"/>
    <circle cx="120" cy="298" r="3" fill="#ffffff" fill-opacity="0.65"/>
    <circle cx="392" cy="298" r="3" fill="#ffffff" fill-opacity="0.65"/>
    <circle cx="135" cy="290" r="2.5" fill="#ffffff" fill-opacity="0.6"/>
    <circle cx="377" cy="290" r="2.5" fill="#ffffff" fill-opacity="0.6"/>
  </g>

  <!-- === CONNECTING LINES === -->
  <g fill="none" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.3" stroke-dasharray="3,4">
    <line x1="240" y1="200" x2="185" y2="230"/>
    <line x1="272" y1="200" x2="327" y2="230"/>
    <line x1="205" y1="260" x2="120" y2="298"/>
    <line x1="307" y1="260" x2="392" y2="298"/>
    <line x1="240" y1="200" x2="256" y2="155"/>
    <line x1="272" y1="200" x2="256" y2="155"/>
    <line x1="185" y1="230" x2="205" y2="260"/>
    <line x1="327" y1="230" x2="307" y2="260"/>
  </g>

  <!-- === CENTER GLOW === -->
  <ellipse cx="256" cy="340" rx="130" ry="60" fill="url(#monoCenterGlow)" filter="url(#monoSoftGlow)"/>

  <!-- Bright core -->
  <circle cx="256" cy="335" r="8" fill="#ffffff" fill-opacity="0.7" filter="url(#monoSoftGlow)"/>
  <circle cx="256" cy="335" r="4" fill="#ffffff" fill-opacity="1"/>
</svg>