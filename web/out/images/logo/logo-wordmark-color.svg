<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="400" height="80">
  <defs>
    <linearGradient id="wmGold" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b8960b"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#fff0a0"/>
    </linearGradient>
    <radialGradient id="wmGlow" cx="50%" cy="78%" r="35%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#ffd700" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- LOTUS ICON (scaled to ~60px, positioned left) -->
  <g transform="translate(8, 6)">
    <!-- Left base petal -->
    <path d="M30,54 Q20,52 10,47 Q6,44 10,41 Q15,39 22,41 Q26,46 30,54Z"
      fill="#8fb4e8" fill-opacity="0.15" stroke="url(#wmGold)" stroke-width="0.9" stroke-linejoin="round"/>
    <!-- Right base petal -->
    <path d="M30,54 Q40,52 50,47 Q54,44 50,41 Q45,39 38,41 Q34,46 30,54Z"
      fill="#8fb4e8" fill-opacity="0.15" stroke="url(#wmGold)" stroke-width="0.9" stroke-linejoin="round"/>
    <!-- Left inner petal -->
    <path d="M30,54 Q24,48 19,38 Q17,32 20,29 Q24,29 27,34 Q29,42 30,54Z"
      fill="#b0c8f0" fill-opacity="0.18" stroke="url(#wmGold)" stroke-width="0.9" stroke-linejoin="round"/>
    <!-- Right inner petal -->
    <path d="M30,54 Q36,48 41,38 Q43,32 40,29 Q36,29 33,34 Q31,42 30,54Z"
      fill="#b0c8f0" fill-opacity="0.18" stroke="url(#wmGold)" stroke-width="0.9" stroke-linejoin="round"/>
    <!-- Center petal -->
    <path d="M30,54 Q27,46 26,37 Q26,30 30,22 Q34,30 34,37 Q33,46 30,54Z"
      fill="#d0e0ff" fill-opacity="0.2" stroke="url(#wmGold)" stroke-width="1.1" stroke-linejoin="round"/>

    <!-- Cyan edges -->
    <path d="M30,54 Q20,52 10,47 Q6,44 10,41" fill="none" stroke="#00f0ff" stroke-width="0.6" stroke-opacity="0.6"/>
    <path d="M30,54 Q40,52 50,47 Q54,44 50,41" fill="none" stroke="#00f0ff" stroke-width="0.6" stroke-opacity="0.6"/>

    <!-- Nodes -->
    <circle cx="30" cy="24" r="1.5" fill="#00f0ff" fill-opacity="0.9"/>
    <circle cx="19" cy="36" r="1.2" fill="#00f0ff" fill-opacity="0.7"/>
    <circle cx="41" cy="36" r="1.2" fill="#00f0ff" fill-opacity="0.7"/>

    <!-- Center glow -->
    <ellipse cx="30" cy="54" rx="14" ry="6" fill="url(#wmGlow)"/>
    <circle cx="30" cy="53" r="2" fill="#ffffff" fill-opacity="0.9"/>
  </g>

  <!-- TEXT -->
  <g transform="translate(78, 0)">
    <text x="0" y="49" font-family="'Space Grotesk', 'Inter', 'Segoe UI', system-ui, sans-serif"
      font-weight="700" font-size="28" letter-spacing="0.15em"
      fill="#00f0ff">PRAGYAN</text>
    <text x="215" y="49" font-family="'Space Grotesk', 'Inter', 'Segoe UI', system-ui, sans-serif"
      font-weight="700" font-size="28" letter-spacing="0.15em"
      fill="#ffd700">AI</text>
  </g>
</svg>
