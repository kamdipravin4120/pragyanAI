<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="400" height="80">
  <defs>
    <linearGradient id="wmPetalGrad" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="wmCenterGlow" cx="50%" cy="75%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="35%" stop-color="#ffd700" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="wmGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="wmNodeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- === ICON (left side, centered vertically, ~60px tall) === -->
  <g transform="translate(10, 8)">
    <!-- Scaled icon: fits in ~60x64 area -->
    <!-- Outer-left petal -->
    <path d="M30,52 Q22,50 12,47 Q8,43 14,39 Q20,37 26,38 Q28,44 30,52Z"
      fill="url(#wmPetalGrad)" stroke="#ffd700" stroke-width="0.8" stroke-opacity="0.8" stroke-linejoin="round"/>
    <path d="M30,52 Q22,50 12,47"
      fill="none" stroke="#00f0ff" stroke-width="0.5" stroke-opacity="0.5"/>

    <!-- Outer-right petal -->
    <path d="M30,52 Q38,50 48,47 Q52,43 46,39 Q40,37 34,38 Q32,44 30,52Z"
      fill="url(#wmPetalGrad)" stroke="#ffd700" stroke-width="0.8" stroke-opacity="0.8" stroke-linejoin="round"/>
    <path d="M30,52 Q38,50 48,47"
      fill="none" stroke="#00f0ff" stroke-width="0.5" stroke-opacity="0.5"/>

    <!-- Middle-left petal -->
    <path d="M30,52 Q24,44 19,34 Q17,28 20,26 Q24,27 28,32 Q30,40 30,52Z"
      fill="url(#wmPetalGrad)" stroke="#ffd700" stroke-width="0.8" stroke-opacity="0.85" stroke-linejoin="round"/>
    <path d="M30,52 Q24,44 19,34 Q17,28 20,26"
      fill="none" stroke="#00f0ff" stroke-width="0.5" stroke-opacity="0.45"/>

    <!-- Middle-right petal -->
    <path d="M30,52 Q36,44 41,34 Q43,28 40,26 Q36,27 32,32 Q30,40 30,52Z"
      fill="url(#wmPetalGrad)" stroke="#ffd700" stroke-width="0.8" stroke-opacity="0.85" stroke-linejoin="round"/>
    <path d="M30,52 Q36,44 41,34 Q43,28 40,26"
      fill="none" stroke="#00f0ff" stroke-width="0.5" stroke-opacity="0.45"/>

    <!-- Center petal -->
    <path d="M30,52 Q28,40 27.5,30 Q27.8,20 30,10 Q32.2,20 32.5,30 Q32,40 30,52Z"
      fill="url(#wmPetalGrad)" stroke="#ffd700" stroke-width="1" stroke-opacity="0.9" stroke-linejoin="round"/>
    <line x1="30" y1="50" x2="30" y2="14"
      stroke="#00f0ff" stroke-width="0.4" stroke-opacity="0.45"/>

    <!-- Center glow -->
    <ellipse cx="30" cy="52" rx="16" ry="7" fill="url(#wmCenterGlow)"/>

    <!-- Nodes -->
    <g filter="url(#wmNodeGlow)">
      <circle cx="30" cy="14" r="1.5" fill="#00f0ff" fill-opacity="0.9"/>
      <circle cx="19" cy="31" r="1.3" fill="#00f0ff" fill-opacity="0.8"/>
      <circle cx="41" cy="31" r="1.3" fill="#00f0ff" fill-opacity="0.8"/>
      <circle cx="13" cy="45" r="1" fill="#00f0ff" fill-opacity="0.7"/>
      <circle cx="47" cy="45" r="1" fill="#00f0ff" fill-opacity="0.7"/>
    </g>

    <!-- Gold connections -->
    <g stroke="#ffd700" stroke-width="0.4" stroke-opacity="0.35" stroke-dasharray="2,2.5" fill="none">
      <line x1="30" y1="14" x2="19" y2="31"/>
      <line x1="30" y1="14" x2="41" y2="31"/>
      <line x1="19" y1="31" x2="13" y2="45"/>
      <line x1="41" y1="31" x2="47" y2="45"/>
    </g>

    <!-- Core -->
    <circle cx="30" cy="51" r="2.5" fill="#ffffff" fill-opacity="0.8" filter="url(#wmGlow)"/>
    <circle cx="30" cy="51" r="1.2" fill="#ffffff"/>
  </g>

  <!-- === TEXT === -->
  <g transform="translate(82, 0)">
    <!-- "PRAGYAN" in cyan -->
    <text x="0" y="49" font-family="'Space Grotesk', 'Inter', 'Segoe UI', system-ui, sans-serif"
      font-weight="700" font-size="28" letter-spacing="0.15em"
      fill="#00f0ff">PRAGYAN</text>

    <!-- "AI" in gold, offset after PRAGYAN -->
    <text x="215" y="49" font-family="'Space Grotesk', 'Inter', 'Segoe UI', system-ui, sans-serif"
      font-weight="700" font-size="28" letter-spacing="0.15em"
      fill="#ffd700">AI</text>
  </g>
</svg>