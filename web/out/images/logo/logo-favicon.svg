<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="fGold" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b8960b"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#fff0a0"/>
    </linearGradient>
    <radialGradient id="fGlow" cx="50%" cy="78%" r="30%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ffd700" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Simplified lotus - 5 petals, bold strokes -->
  <!-- Left base petal -->
  <path d="M32,44 Q22,42 12,37 Q8,34 12,31 Q17,29 24,31 Q28,36 32,44Z"
    fill="#8fb4e8" fill-opacity="0.15" stroke="url(#fGold)" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Right base petal -->
  <path d="M32,44 Q42,42 52,37 Q56,34 52,31 Q47,29 40,31 Q36,36 32,44Z"
    fill="#8fb4e8" fill-opacity="0.15" stroke="url(#fGold)" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Left inner petal -->
  <path d="M32,44 Q26,38 21,28 Q19,22 22,19 Q26,19 29,24 Q31,32 32,44Z"
    fill="#b0c8f0" fill-opacity="0.18" stroke="url(#fGold)" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Right inner petal -->
  <path d="M32,44 Q38,38 43,28 Q45,22 42,19 Q38,19 35,24 Q33,32 32,44Z"
    fill="#b0c8f0" fill-opacity="0.18" stroke="url(#fGold)" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Center petal -->
  <path d="M32,44 Q29,36 28,27 Q28,20 32,14 Q36,20 36,27 Q35,36 32,44Z"
    fill="#d0e0ff" fill-opacity="0.2" stroke="url(#fGold)" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Cyan edges -->
  <path d="M32,44 Q22,42 12,37 Q8,34 12,31" fill="none" stroke="#00f0ff" stroke-width="0.8" stroke-opacity="0.7"/>
  <path d="M32,44 Q42,42 52,37 Q56,34 52,31" fill="none" stroke="#00f0ff" stroke-width="0.8" stroke-opacity="0.7"/>

  <!-- Neural nodes -->
  <circle cx="32" cy="16" r="1.8" fill="#00f0ff" fill-opacity="0.9"/>
  <circle cx="21" cy="26" r="1.5" fill="#00f0ff" fill-opacity="0.7"/>
  <circle cx="43" cy="26" r="1.5" fill="#00f0ff" fill-opacity="0.7"/>

  <!-- Center glow -->
  <ellipse cx="32" cy="44" rx="14" ry="6" fill="url(#fGlow)"/>
  <circle cx="32" cy="43" r="2" fill="#ffffff"/>
</svg>
