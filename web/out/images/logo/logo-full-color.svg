<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 420" width="512" height="420">
  <defs>
    <linearGradient id="petalOuter" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#c0d8ff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#90b8e8" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="petalMid" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#d0e0ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#b8c8f8" stop-opacity="0.14"/>
    </linearGradient>
    <linearGradient id="petalInner" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#e0e8ff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#d0d8ff" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="petalCenter" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e0d8ff" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b8960b"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#fff0a0"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="80%" r="28%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="25%" stop-color="#fff8e0" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#ffd700" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tipGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
    <filter id="cyanGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0  0 0.85 0.9 0 0  0 0.9 1 0 0  0 0 0 0.45 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ===== LOTUS FLOWER ===== -->
  <!-- All petals originate from center base point (256, 330) -->

  <!-- LAYER 1: Two wide, flat base petals like cupped hands -->
  <!-- Left base petal — wide eye/boat shape -->
  <g filter="url(#cyanGlow)">
    <path d="M256,330 C230,328 170,318 110,298 C70,284 40,270 38,262 C36,254 55,248 85,244 C130,238 185,240 220,260 C240,290 256,330 256,330Z"
      fill="url(#petalOuter)" stroke="url(#gold)" stroke-width="1.4" stroke-linejoin="round"/>
    <path d="M256,330 C230,328 170,318 110,298 C70,284 40,270 38,262"
      fill="none" stroke="#00f0ff" stroke-width="1" stroke-opacity="0.65"/>
    <!-- Circuit trace -->
    <path d="M240,318 C210,308 160,295 115,280" fill="none" stroke="#00f0ff" stroke-width="0.5" stroke-opacity="0.35"/>
  </g>

  <!-- Right base petal — mirror -->
  <g filter="url(#cyanGlow)">
    <path d="M256,330 C282,328 342,318 402,298 C442,284 472,270 474,262 C476,254 457,248 427,244 C382,238 327,240 292,260 C272,290 256,330 256,330Z"
      fill="url(#petalOuter)" stroke="url(#gold)" stroke-width="1.4" stroke-linejoin="round"/>
    <path d="M256,330 C282,328 342,318 402,298 C442,284 472,270 474,262"
      fill="none" stroke="#00f0ff" stroke-width="1" stroke-opacity="0.65"/>
    <path d="M272,318 C302,308 352,295 397,280" fill="none" stroke="#00f0ff" stroke-width="0.5" stroke-opacity="0.35"/>
  </g>

  <!-- LAYER 2: Two mid petals — wide leaf ovals angled ~35deg -->
  <!-- Left mid petal -->
  <g filter="url(#cyanGlow)">
    <path d="M256,330 C240,310 200,268 165,228 C145,204 130,180 132,168 C134,156 148,150 165,155 C188,162 215,188 238,230 C250,270 256,330 256,330Z"
      fill="url(#petalMid)" stroke="url(#gold)" stroke-width="1.4" stroke-linejoin="round"/>
    <path d="M256,330 C240,310 200,268 165,228 C145,204 130,180 132,168"
      fill="none" stroke="#00f0ff" stroke-width="0.9" stroke-opacity="0.55"/>
    <!-- Inner vein -->
    <path d="M256,325 C242,305 210,270 178,235 C162,215 148,195 146,180"
      fill="none" stroke="url(#gold)" stroke-width="0.5" stroke-opacity="0.3"/>
    <!-- Circuit -->
    <path d="M245,300 L205,255 L180,225" fill="none" stroke="#00f0ff" stroke-width="0.5" stroke-opacity="0.35"/>
    <path d="M205,255 L192,248" fill="none" stroke="#00f0ff" stroke-width="0.5" stroke-opacity="0.3"/>
  </g>

  <!-- Right mid petal — mirror -->
  <g filter="url(#cyanGlow)">
    <path d="M256,330 C272,310 312,268 347,228 C367,204 382,180 380,168 C378,156 364,150 347,155 C324,162 297,188 274,230 C262,270 256,330 256,330Z"
      fill="url(#petalMid)" stroke="url(#gold)" stroke-width="1.4" stroke-linejoin="round"/>
    <path d="M256,330 C272,310 312,268 347,228 C367,204 382,180 380,168"
      fill="none" stroke="#00f0ff" stroke-width="0.9" stroke-opacity="0.55"/>
    <path d="M256,325 C270,305 302,270 334,235 C350,215 364,195 366,180"
      fill="none" stroke="url(#gold)" stroke-width="0.5" stroke-opacity="0.3"/>
    <path d="M267,300 L307,255 L332,225" fill="none" stroke="#00f0ff" stroke-width="0.5" stroke-opacity="0.35"/>
    <path d="M307,255 L320,248" fill="none" stroke="#00f0ff" stroke-width="0.5" stroke-opacity="0.3"/>
  </g>

  <!-- LAYER 3: Two inner petals — steeper angle ~55deg -->
  <!-- Left inner petal -->
  <g filter="url(#cyanGlow)">
    <path d="M256,330 C246,305 225,258 210,210 C200,178 195,150 200,135 C205,122 218,118 230,128 C244,142 252,175 256,220 C258,265 256,330 256,330Z"
      fill="url(#petalInner)" stroke="url(#gold)" stroke-width="1.4" stroke-linejoin="round"/>
    <path d="M256,330 C246,305 225,258 210,210 C200,178 195,150 200,135"
      fill="none" stroke="#00f0ff" stroke-width="0.8" stroke-opacity="0.5"/>
    <!-- Inner vein -->
    <path d="M256,320 C248,298 233,258 222,218 C214,190 210,165 214,148"
      fill="none" stroke="url(#gold)" stroke-width="0.5" stroke-opacity="0.3"/>
  </g>

  <!-- Right inner petal — mirror -->
  <g filter="url(#cyanGlow)">
    <path d="M256,330 C266,305 287,258 302,210 C312,178 317,150 312,135 C307,122 294,118 282,128 C268,142 260,175 256,220 C254,265 256,330 256,330Z"
      fill="url(#petalInner)" stroke="url(#gold)" stroke-width="1.4" stroke-linejoin="round"/>
    <path d="M256,330 C266,305 287,258 302,210 C312,178 317,150 312,135"
      fill="none" stroke="#00f0ff" stroke-width="0.8" stroke-opacity="0.5"/>
    <path d="M256,320 C264,298 279,258 290,218 C298,190 302,165 298,148"
      fill="none" stroke="url(#gold)" stroke-width="0.5" stroke-opacity="0.3"/>
  </g>

  <!-- LAYER 4: Center petal — tall, pointed, widest petal -->
  <g filter="url(#cyanGlow)">
    <path d="M256,330 C248,295 240,240 236,195 C232,158 236,120 244,95 C250,78 256,68 256,68 C256,68 262,78 268,95 C276,120 280,158 276,195 C272,240 264,295 256,330Z"
      fill="url(#petalCenter)" stroke="url(#gold)" stroke-width="1.8" stroke-linejoin="round"/>
    <path d="M256,330 C248,295 240,240 236,195 C232,158 236,120 244,95 C250,78 256,68"
      fill="none" stroke="#00f0ff" stroke-width="0.8" stroke-opacity="0.55"/>
    <path d="M256,330 C264,295 272,240 276,195 C280,158 276,120 268,95 C262,78 256,68"
      fill="none" stroke="#00f0ff" stroke-width="0.8" stroke-opacity="0.55"/>
    <!-- Inner leaf shape -->
    <path d="M256,315 C250,285 245,240 243,205 C241,175 244,145 250,120 C254,105 256,95 256,95 C256,95 258,105 262,120 C268,145 271,175 269,205 C267,240 262,285 256,315Z"
      fill="none" stroke="url(#gold)" stroke-width="0.7" stroke-opacity="0.35"/>
    <!-- Center vein -->
    <line x1="256" y1="320" x2="256" y2="80" stroke="url(#gold)" stroke-width="0.5" stroke-opacity="0.4"/>
  </g>

  <!-- ===== NEURAL NODES ===== -->
  <g filter="url(#nodeGlow)">
    <circle cx="256" cy="85" r="4" fill="#00f0ff" fill-opacity="0.9"/>
    <circle cx="243" cy="180" r="3" fill="#00f0ff" fill-opacity="0.75"/>
    <circle cx="269" cy="180" r="3" fill="#00f0ff" fill-opacity="0.75"/>
    <circle cx="180" cy="225" r="3.5" fill="#00f0ff" fill-opacity="0.8"/>
    <circle cx="332" cy="225" r="3.5" fill="#00f0ff" fill-opacity="0.8"/>
    <circle cx="192" cy="248" r="2.5" fill="#00f0ff" fill-opacity="0.65"/>
    <circle cx="320" cy="248" r="2.5" fill="#00f0ff" fill-opacity="0.65"/>
    <circle cx="115" cy="280" r="3" fill="#00f0ff" fill-opacity="0.6"/>
    <circle cx="397" cy="280" r="3" fill="#00f0ff" fill-opacity="0.6"/>
  </g>

  <!-- Gold connections -->
  <g fill="none" stroke="#ffd700" stroke-width="0.5" stroke-opacity="0.3" stroke-dasharray="3,4">
    <line x1="256" y1="85" x2="243" y2="180"/>
    <line x1="256" y1="85" x2="269" y2="180"/>
    <line x1="243" y1="180" x2="180" y2="225"/>
    <line x1="269" y1="180" x2="332" y2="225"/>
    <line x1="180" y1="225" x2="115" y2="280"/>
    <line x1="332" y1="225" x2="397" y2="280"/>
    <line x1="180" y1="225" x2="192" y2="248"/>
    <line x1="332" y1="225" x2="320" y2="248"/>
  </g>

  <!-- ===== CENTER GLOW ===== -->
  <ellipse cx="256" cy="330" rx="130" ry="55" fill="url(#centerGlow)" filter="url(#softGlow)"/>
  <circle cx="256" cy="326" r="8" fill="#ffffff" fill-opacity="0.75" filter="url(#softGlow)"/>
  <circle cx="256" cy="326" r="4" fill="#ffffff"/>

  <!-- Top tip glow -->
  <circle cx="256" cy="68" r="14" fill="url(#tipGlow)"/>
</svg>
