name: Build & Deploy to cPanel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Build static export
        run: npx next build
        working-directory: web

      - name: Copy .htaccess to output
        run: cp ../.htaccess out/.htaccess
        working-directory: web

      - name: Deploy via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp > /dev/null 2>&1
          lftp -c "
            set ftp:ssl-allow no;
            set ftp:passive-mode yes;
            set net:max-retries 3;
            set net:timeout 30;
            open -u ${FTP_USER},${FTP_PASS} ${FTP_HOST};
            mirror --reverse --verbose --parallel=5 --exclude-glob .git* web/out/ /;
            quit;
          "
